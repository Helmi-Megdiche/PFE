services:
  postgres:
    image: postgres:16-alpine
    container_name: pfe-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pfe_parental_control
    volumes:
      - pfe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pfe_parental_control"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pfe_pg_data:
